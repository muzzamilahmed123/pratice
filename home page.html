<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        header {
            background: #333;
            color: #fff;
            padding: 15px 0;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 90%;
            margin: auto;
        }
        nav h1 {
            margin: 0;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        nav ul li {
            display: inline;
        }
        nav ul li a {
            color: #fff;
            text-decoration: none;
        }
        .hero {
            background: url('https://via.placeholder.com/1500x500') no-repeat center/cover;
            color: white;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero h2 {
            font-size: 40px;
        }
        .section {
            padding: 40px;
            text-align: center;
        }
        .features {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
        }
        .feature-box {
            width: 30%;
            padding: 20px;
            margin: 10px;
            background: #f4f4f4;
            border-radius: 10px;
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 15px 0;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <h1>MySite</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
</header>

<section class="hero">
    <div>
        <h2>Welcome to My Website</h2>
        <p>Your success starts here</p>
    </div>
</section>

<section class="section">
    <h2>Our Features</h2>
    <div class="features">
        <div class="feature-box">
            <h3>Fast</h3>
            <p>Quick and responsive design.</p>
        </div>
        <div class="feature-box">
            <h3>Reliable</h3>
            <p>Trusted by many users worldwide.</p>
        </div>
        <div class="feature-box">
            <h3>Secure</h3>
            <p>Your data is safe with us.</p>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 MySite. All rights reserved.</p>
</footer>

</body>
</html>
